<svg xmlns="http://www.w3.org/2000/svg" width="1500" height="1320" viewBox="0 0 1500 1320" role="img" aria-labelledby="title desc">
  <title id="title">DER Agrupamento de Custo CMC</title>
  <desc id="desc">DER em formato de tabela das entidades EMPRESA, AGRUPAMENTO_CUSTO_TIPO, AGRUPAMENTO_CUSTO e AGRUPAMENTO_CUSTO_EMPRESA.</desc>
  <defs>
    <marker id="arrow" viewBox="0 0 12 12" refX="10" refY="6" markerWidth="12" markerHeight="12" orient="auto">
      <path d="M 1 1 L 10 6 L 1 11 Z" fill="#263238"/>
    </marker>
    <style>
      .bg { fill: #f7f9fc; }
      .title { font: 700 34px Arial, sans-serif; fill: #111827; }
      .subtitle { font: 400 18px Arial, sans-serif; fill: #4b5563; }
      .table { fill: #ffffff; stroke: #263238; stroke-width: 2.4; rx: 8; }
      .header { fill: #263238; }
      .header-text { font: 700 21px Arial, sans-serif; fill: #ffffff; }
      .head-row { fill: #eef2f7; }
      .head-text { font: 700 17px Arial, sans-serif; fill: #263238; }
      .cell-name { font: 700 17px Consolas, monospace; fill: #111827; }
      .cell-type { font: 400 16px Consolas, monospace; fill: #374151; }
      .cell-desc { font: 400 15px Arial, sans-serif; fill: #374151; }
      .grid { stroke: #cbd5e1; stroke-width: 1.4; }
      .tag { font: 700 13px Arial, sans-serif; fill: #ffffff; }
      .pk { fill: #047857; }
      .fk { fill: #1d4ed8; }
      .uk { fill: #b45309; }
      .rel { stroke: #263238; stroke-width: 3; fill: none; marker-end: url(#arrow); }
      .rel-label-bg { fill: #f7f9fc; }
      .rel-label { font: 700 18px Arial, sans-serif; fill: #111827; }
      .note-title { font: 700 18px Arial, sans-serif; fill: #111827; }
      .note { font: 400 15px Arial, sans-serif; fill: #374151; }
    </style>
  </defs>

  <rect class="bg" width="1500" height="1320"/>

  <text class="title" x="750" y="58" text-anchor="middle">DER - Agrupamento de Custo CMC</text>
  <text class="subtitle" x="750" y="90" text-anchor="middle">Modelo das tabelas de agrupamento utilizadas no processamento de custo medio de compra</text>

  <g id="tipo" transform="translate(155 130)">
    <rect class="table" x="0" y="0" width="1190" height="250"/>
    <path class="header" d="M 8 0 H 1182 A 8 8 0 0 1 1190 8 V 48 H 0 V 8 A 8 8 0 0 1 8 0 Z"/>
    <text class="header-text" x="595" y="31" text-anchor="middle">DBA.AGRUPAMENTO_CUSTO_TIPO</text>
    <rect class="head-row" x="0" y="48" width="1190" height="40"/>
    <text class="head-text" x="24" y="74">Coluna</text>
    <text class="head-text" x="360" y="74">Tipo</text>
    <text class="head-text" x="650" y="74">Chave</text>
    <text class="head-text" x="760" y="74">Descricao</text>
    <line class="grid" x1="340" y1="48" x2="340" y2="250"/>
    <line class="grid" x1="630" y1="48" x2="630" y2="250"/>
    <line class="grid" x1="740" y1="48" x2="740" y2="250"/>
    <line class="grid" x1="0" y1="88" x2="1190" y2="88"/>
    <line class="grid" x1="0" y1="142" x2="1190" y2="142"/>
    <line class="grid" x1="0" y1="196" x2="1190" y2="196"/>
    <text class="cell-name" x="24" y="122">IDAGRUPAMENTOTIPO</text>
    <text class="cell-type" x="360" y="122">INTEGER IDENTITY NOT NULL</text>
    <rect class="pk" x="650" y="101" width="58" height="26" rx="4"/>
    <text class="tag" x="679" y="119" text-anchor="middle">PK</text>
    <text class="cell-desc" x="760" y="121">Identificador do tipo de agrupamento.</text>
    <text class="cell-name" x="24" y="176">DESCRICAO</text>
    <text class="cell-type" x="360" y="176">VARCHAR(50) NOT NULL</text>
    <text class="cell-desc" x="760" y="175">Descricao funcional do tipo.</text>
    <text class="cell-name" x="24" y="230">SIGLA</text>
    <text class="cell-type" x="360" y="230">VARCHAR(10) NOT NULL</text>
    <rect class="uk" x="650" y="209" width="58" height="26" rx="4"/>
    <text class="tag" x="679" y="227" text-anchor="middle">UK</text>
    <text class="cell-desc" x="760" y="229">Codigo unico do tipo, exemplo: CMC.</text>
  </g>

  <g id="custo" transform="translate(155 470)">
    <rect class="table" x="0" y="0" width="1190" height="250"/>
    <path class="header" d="M 8 0 H 1182 A 8 8 0 0 1 1190 8 V 48 H 0 V 8 A 8 8 0 0 1 8 0 Z"/>
    <text class="header-text" x="595" y="31" text-anchor="middle">DBA.AGRUPAMENTO_CUSTO</text>
    <rect class="head-row" x="0" y="48" width="1190" height="40"/>
    <text class="head-text" x="24" y="74">Coluna</text>
    <text class="head-text" x="360" y="74">Tipo</text>
    <text class="head-text" x="650" y="74">Chave</text>
    <text class="head-text" x="760" y="74">Descricao</text>
    <line class="grid" x1="340" y1="48" x2="340" y2="250"/>
    <line class="grid" x1="630" y1="48" x2="630" y2="250"/>
    <line class="grid" x1="740" y1="48" x2="740" y2="250"/>
    <line class="grid" x1="0" y1="88" x2="1190" y2="88"/>
    <line class="grid" x1="0" y1="142" x2="1190" y2="142"/>
    <line class="grid" x1="0" y1="196" x2="1190" y2="196"/>
    <text class="cell-name" x="24" y="122">IDAGRUPAMENTOCUSTO</text>
    <text class="cell-type" x="360" y="122">INTEGER IDENTITY NOT NULL</text>
    <rect class="pk" x="650" y="101" width="58" height="26" rx="4"/>
    <text class="tag" x="679" y="119" text-anchor="middle">PK</text>
    <text class="cell-desc" x="760" y="121">Identificador do agrupamento.</text>
    <text class="cell-name" x="24" y="176">DESCRICAO</text>
    <text class="cell-type" x="360" y="176">VARCHAR(100) NOT NULL</text>
    <text class="cell-desc" x="760" y="175">Descricao do agrupamento de custo.</text>
    <text class="cell-name" x="24" y="230">TIPOAGRUPAMENTO</text>
    <text class="cell-type" x="360" y="230">INTEGER NOT NULL</text>
    <rect class="fk" x="650" y="209" width="58" height="26" rx="4"/>
    <text class="tag" x="679" y="227" text-anchor="middle">FK</text>
    <text class="cell-desc" x="760" y="229">Referencia AGRUPAMENTO_CUSTO_TIPO.</text>
  </g>

  <g id="empresa" transform="translate(155 810)">
    <rect class="table" x="0" y="0" width="1190" height="250"/>
    <path class="header" d="M 8 0 H 1182 A 8 8 0 0 1 1190 8 V 48 H 0 V 8 A 8 8 0 0 1 8 0 Z"/>
    <text class="header-text" x="595" y="31" text-anchor="middle">DBA.AGRUPAMENTO_CUSTO_EMPRESA</text>
    <rect class="head-row" x="0" y="48" width="1190" height="40"/>
    <text class="head-text" x="24" y="74">Coluna</text>
    <text class="head-text" x="360" y="74">Tipo</text>
    <text class="head-text" x="650" y="74">Chave</text>
    <text class="head-text" x="760" y="74">Descricao</text>
    <line class="grid" x1="340" y1="48" x2="340" y2="250"/>
    <line class="grid" x1="630" y1="48" x2="630" y2="250"/>
    <line class="grid" x1="740" y1="48" x2="740" y2="250"/>
    <line class="grid" x1="0" y1="88" x2="1190" y2="88"/>
    <line class="grid" x1="0" y1="142" x2="1190" y2="142"/>
    <line class="grid" x1="0" y1="196" x2="1190" y2="196"/>
    <text class="cell-name" x="24" y="122">IDAGRUPAMENTOCUSTOEMPRESA</text>
    <text class="cell-type" x="360" y="122">INTEGER IDENTITY NOT NULL</text>
    <rect class="pk" x="650" y="101" width="58" height="26" rx="4"/>
    <text class="tag" x="679" y="119" text-anchor="middle">PK</text>
    <text class="cell-desc" x="760" y="121">Identificador do vinculo empresa/grupo.</text>
    <text class="cell-name" x="24" y="176">IDEMPRESA</text>
    <text class="cell-type" x="360" y="176">INTEGER NOT NULL</text>
    <rect class="fk" x="650" y="155" width="58" height="26" rx="4"/>
    <text class="tag" x="679" y="173" text-anchor="middle">FK</text>
    <rect class="uk" x="714" y="155" width="58" height="26" rx="4"/>
    <text class="tag" x="743" y="173" text-anchor="middle">UK</text>
    <text class="cell-desc" x="790" y="175">Referencia EMPRESA e compoe unicidade.</text>
    <text class="cell-name" x="24" y="230">IDAGRUPAMENTOCUSTO</text>
    <text class="cell-type" x="360" y="230">INTEGER NOT NULL</text>
    <rect class="fk" x="650" y="209" width="58" height="26" rx="4"/>
    <text class="tag" x="679" y="227" text-anchor="middle">FK</text>
    <text class="cell-desc" x="760" y="229">Referencia AGRUPAMENTO_CUSTO.</text>
  </g>

  <path class="rel" d="M 750 380 L 750 470"/>
  <rect class="rel-label-bg" x="568" y="410" width="364" height="34" rx="17"/>
  <text class="rel-label" x="750" y="433" text-anchor="middle">1 tipo classifica N agrupamentos</text>

  <path class="rel" d="M 750 720 L 750 810"/>
  <rect class="rel-label-bg" x="542" y="750" width="416" height="34" rx="17"/>
  <text class="rel-label" x="750" y="773" text-anchor="middle">1 agrupamento possui N empresas</text>

  <g id="empresa-ref" transform="translate(155 1105)">
    <rect class="table" x="0" y="0" width="1190" height="96"/>
    <path class="header" d="M 8 0 H 1182 A 8 8 0 0 1 1190 8 V 42 H 0 V 8 A 8 8 0 0 1 8 0 Z"/>
    <text class="header-text" x="595" y="28" text-anchor="middle">DBA.EMPRESA</text>
    <line class="grid" x1="340" y1="42" x2="340" y2="96"/>
    <line class="grid" x1="630" y1="42" x2="630" y2="96"/>
    <line class="grid" x1="740" y1="42" x2="740" y2="96"/>
    <text class="cell-name" x="24" y="76">IDEMPRESA</text>
    <text class="cell-type" x="360" y="76">INTEGER</text>
    <rect class="pk" x="650" y="55" width="58" height="26" rx="4"/>
    <text class="tag" x="679" y="73" text-anchor="middle">PK</text>
    <text class="cell-desc" x="760" y="75">Cadastro referenciado pela empresa do agrupamento.</text>
  </g>

  <path class="rel" d="M 1040 1105 C 1040 1080 1040 1080 1040 1060"/>
  <rect class="rel-label-bg" x="865" y="1070" width="350" height="34" rx="17"/>
  <text class="rel-label" x="1040" y="1093" text-anchor="middle">1 empresa participa de N vinculos</text>

  <g transform="translate(155 1260)">
    <text class="note-title" x="0" y="0">Legenda:</text>
    <rect class="pk" x="90" y="-20" width="44" height="24" rx="4"/>
    <text class="tag" x="112" y="-4" text-anchor="middle">PK</text>
    <text class="note" x="144" y="0">Chave primaria</text>
    <rect class="fk" x="290" y="-20" width="44" height="24" rx="4"/>
    <text class="tag" x="312" y="-4" text-anchor="middle">FK</text>
    <text class="note" x="344" y="0">Chave estrangeira</text>
    <rect class="uk" x="520" y="-20" width="44" height="24" rx="4"/>
    <text class="tag" x="542" y="-4" text-anchor="middle">UK</text>
    <text class="note" x="574" y="0">Restricao unica</text>
  </g>
</svg>
